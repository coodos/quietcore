# /etc/tlp.d/01-quietcore.conf
# TLP drop-in for quietcore.
# EPP, platform profile, turbo, and HWP dynamic boost are all managed
# dynamically by cpu-profile-switch. TLP handles everything else.

# -- CPU scaling ---------------------------------------------------------------
# intel_pstate: powersave governor with HWP is correct. EPP drives behaviour.
CPU_SCALING_GOVERNOR_ON_AC=powersave
CPU_SCALING_GOVERNOR_ON_BAT=powersave

# EPP set to balance_power on both sources so that when TLP's udev rule fires
# on power events it writes our quiet default rather than balance_performance.
# The cpu-profile-switch daemon overrides this to performance under load.
CPU_ENERGY_PERF_POLICY_ON_AC=balance_performance
CPU_ENERGY_PERF_POLICY_ON_BAT=balance_power

# Don't cap perf percentage - EPP and platform profile do the limiting.
CPU_MIN_PERF_ON_AC=0
CPU_MAX_PERF_ON_AC=100
CPU_MIN_PERF_ON_BAT=0
CPU_MAX_PERF_ON_BAT=100

# -- Scheduler -----------------------------------------------------------------
SCHED_POWERSAVE_ON_AC=0
SCHED_POWERSAVE_ON_BAT=0

# -- USB autosuspend -----------------------------------------------------------
# Enabled for battery savings, but HID devices and audio are excluded.
# Add your own device IDs to USB_DENYLIST if needed (format: "xxxx:yyyy").
USB_AUTOSUSPEND=1
USB_EXCLUDE_AUDIO=1
USB_EXCLUDE_BTUSB=1
USB_DENYLIST=""

# -- WiFi ----------------------------------------------------------------------
WIFI_PWR_ON_AC=off
WIFI_PWR_ON_BAT=on

# -- Disk ----------------------------------------------------------------------
DISK_APM_LEVEL_ON_AC="254 254"
DISK_APM_LEVEL_ON_BAT="128 128"
DISK_SPINDOWN_TIMEOUT_ON_AC="0 0"
DISK_SPINDOWN_TIMEOUT_ON_BAT="0 0"

# -- Runtime PM ----------------------------------------------------------------
RUNTIME_PM_ON_AC=auto
RUNTIME_PM_ON_BAT=auto

# -- Misc ----------------------------------------------------------------------
NMI_WATCHDOG=0
